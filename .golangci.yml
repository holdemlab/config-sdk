version: "2"

run:
  go: "1.21"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gocritic
    - revive
    - misspell
  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - style
    revive:
      rules:
        - name: exported
          arguments:
            - "checkPrivateReceivers"
  exclusions:
    paths:
      - examples
    rules:
      - path: _test\.go
        linters:
          - errcheck
      - path: _test\.go
        text: "unused-parameter"
        linters:
          - revive
